<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src 'none'; script-src 'self' 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuity! — A Film Set Puzzle</title>
  <meta name="description" content="Continuity! — A pixel-art film set puzzle game. Observe take 1, then spot all the changes in take 2.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=PT+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #e0e0d8;
      font-family: 'PT Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
    .back-link {
      align-self: flex-start;
      position: relative;
      display: inline-block;
      font-family: 'PT Mono', 'Courier New', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      padding: 8px 20px;
      color: #c8850e;
      text-decoration: none;
      background-color: transparent;
      border: 2px solid #c8850e;
      border-radius: 24px;
      margin-bottom: 24px;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
    }
    .back-link::before {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      background: #c8850e;
      top: 0; left: -100%;
      border-radius: inherit;
      transition: left 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .back-link span {
      position: relative;
      overflow: hidden;
    }
    .back-link span::before {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      color: #212121;
      width: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .back-link:hover span::before {
      width: 100%;
      transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.4s;
    }
    .back-link:hover::before { left: 0; }
    .back-link:hover { border-color: transparent; }
    .back-link:active { scale: 0.95; }

    /* ── Monitor housing ── */
    .monitor-housing {
      display: flex;
      flex-direction: column;
      width: min(720px, 100%);
      box-shadow: 0 0 0 2px #1a1a2e, 0 20px 60px rgba(0,0,0,0.9);
    }

    /* ── HUD bars ── */
    .hud-top, .hud-bot {
      background: #06060e;
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 34px;
      gap: 10px;
      font-family: 'PT Mono', 'Courier New', monospace;
      font-size: 12px;
    }
    .hud-top { border-bottom: 1px solid #0e0e1c; }
    .hud-bot { border-top:    1px solid #0e0e1c; }

    .hud-cam {
      background: #c8850e;
      color: #000;
      font-weight: 700;
      font-size: 13px;
      padding: 1px 7px;
      flex-shrink: 0;
      font-family: 'PT Mono', 'Courier New', monospace;
    }
    .hud-title {
      color: #c8850e;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
    }
    .hud-sep  { color: #1e1e30; }
    .hud-data { color: #484860; font-size: 12px; flex-shrink: 0; letter-spacing: 0.04em; }
    .hud-phase {
      flex: 1;
      text-align: center;
      color: #cccccc;
      font-size: 12px;
      letter-spacing: 0.06em;
    }
    .hud-rec {
      color: #ef4444;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .rec-sq {
      width: 7px;
      height: 7px;
      background: #ef4444;
      display: inline-block;
      flex-shrink: 0;
      animation: recblink 1.2s step-end infinite;
    }
    @keyframes recblink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .hud-tc {
      background: #000;
      color: #c8850e;
      font-size: 12px;
      padding: 2px 8px;
      border: 1px solid #111120;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }
    .hud-score {
      flex: 1;
      text-align: center;
      color: #ffffff;
      font-size: 12px;
    }
    .hud-round {
      color: #3a3a52;
      font-size: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    /* ── Mobile portrait ── */
    @media (max-width: 800px) {
      body { padding: 12px 8px 24px; }
      .back-link { margin-bottom: 12px; }
      .hud-top, .hud-bot { height: 28px; font-size: 11px; padding: 0 7px; gap: 6px; }
      .hud-data, .hud-sep { display: none; }
      .hud-cam { font-size: 11px; }
      .hud-tc { font-size: 11px; padding: 2px 5px; }
    }

    /* ── Mobile landscape: fit entire game in viewport height ── */
    @media (max-height: 500px) and (orientation: landscape) {
      body { padding: 8px; justify-content: center; }
      .back-link { display: none; }
      .hud-top, .hud-bot { height: 28px; font-size: 11px; padding: 0 7px; gap: 6px; }
      .hud-data, .hud-sep { display: none; }
      .hud-cam { font-size: 11px; }
      .hud-tc { font-size: 11px; padding: 2px 5px; }
      .monitor-housing { width: min(720px, 100%); }
    }

  </style>
</head>
<body>
  <a class="back-link" href="index.html"><span data-label="← Back">← Back</span></a>
<div class="monitor-housing">
    <div class="hud-top">
      <span class="hud-cam">A</span>
      <span class="hud-title">CONTINUITY!</span>
      <span class="hud-sep">·</span>
      <span class="hud-data">SDI 1</span>
      <span class="hud-sep">·</span>
      <span class="hud-data">23.98p</span>
      <span class="hud-phase" id="hud-phase">STANDBY</span>
      <span class="hud-data">S-Log3 › Rec.709</span>
      <span class="hud-sep">·</span>
      <span class="hud-data">1920×1080</span>
      <span class="hud-sep">·</span>
      <span class="hud-rec"><span class="rec-sq"></span>REC</span>
    </div>
    <canvas id="game" role="img" aria-label="Continuity! film set puzzle game"></canvas>
    <div class="hud-bot">
      <span class="hud-tc" id="hud-tc">00:00:00:00</span>
      <span class="hud-sep">·</span>
      <span class="hud-data">T2.8  ·  35mm</span>
      <span class="hud-score" id="hud-score">0 PTS</span>
      <span class="hud-data">ISO 800  ·  180°  ·  3200K</span>
      <span class="hud-sep">·</span>
      <span class="hud-round" id="hud-round">3 ROUNDS</span>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONTINUITY! — pixel-art film continuity game
//  Observe TAKE 1 (8s) · Find all changes in TAKE 2 · Submit
//  3 rounds (3, 4, 5 changes) · +10 per correct find · −5 per wrong click
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
if (!ctx) {
  const msg = document.createElement('p');
  msg.textContent = 'Canvas not supported in this browser.';
  msg.style.cssText = 'color:#c8850e;text-align:center;padding:40px;font-family:monospace';
  document.body.replaceChildren(msg);
  throw new Error('Canvas 2D context unavailable');
}
const S   = 2;      // 1 virtual px = 2 real px
const VW  = 360;    // virtual width
const VH  = 240;    // virtual height
const TOP = 27;     // top bar height
const BOT = 27;     // bottom bar height
const SH  = VH - TOP - BOT;   // scene height = 186

const dpr = window.devicePixelRatio || 1;
canvas.width  = VW * S * dpr;
canvas.height = VH * S * dpr;
ctx.scale(dpr, dpr);
ctx.imageSmoothingEnabled = false;

// ── Colour palette ────────────────────────────────────────────────
const C = {
  wall: '#272736',   wallDk: '#1c1c2c',
  base: '#18182a',
  floor: '#161626',  floorDk: '#101018',
  tape: '#909090',
  tableTop: '#8a6040',  tableSide: '#5a3c20',  tableLeg: '#3c2810',
  skin: '#ddb07a',   hair: '#241508',
  shirt: '#2e5e8a',  shirtDk: '#1e3e5a',
  pants: '#222238',  pantsDk: '#141428',
  shoe: '#0e0e0e',
  mugA: '#ddd5c2',  mugB: '#ada898',  mugCoffee: '#261608',
  boardA: '#c8a450',  boardB: '#886420',  boardLine: '#745410',
  rack: '#261608',   rackMid: '#36261a',
  jacketA: '#762e0e',  jacketB: '#4a1c06',  jacketC: '#5a2208',
  chairA: '#7a4e2e',   chairB: '#4a2e12',
  tieRed: '#b01e10',   tieBlue: '#1450a0',
  frameA: '#6a4618',   frameB: '#4a2c08',
  glass1: '#6070a0',   glass2: '#586890',
  hills1: '#587050',   hills2: '#3e5830',
  bookA: '#d0c290',   bookB: '#2a1606',   bookLine: '#a09060',
  potA: '#b05428',    potB: '#883818',    soil: '#301a0c',
  leafA: '#48a020',   leafB: '#36881a',   leafC: '#58c028',
  stemA: '#448018',
  uiBg: '#070710',    uiText: '#d4d4cc',
  uiDim: '#585870',   uiAccent: '#3468b8',
  lightMtl: '#4a4a5a', lightShade: '#333344', lightGlow: '#8888a0',
  bottleBody: '#b8d8f0', bottleCap: '#e0e0e8', bottleLabel: '#4080c0',
  hatCrown: '#4a3e28', hatBrim: '#3a3020', hatBand: '#2a2418',
  uiGold: '#d8a818',  uiGold2: '#f0cc40',
  uiGreen: '#20982a', uiRed: '#ba2018',   uiAmber: '#c07c10',
};

// ── Helpers ───────────────────────────────────────────────────────
function r(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(x * S, y * S, w * S, h * S);
}
function txt(text, x, y, size, color, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${size * S}px "Press Start 2P", monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x * S, y * S);
}
function inZ(mx, my, z) {
  return mx >= z.x && mx < z.x + z.w && my >= z.y && my < z.y + z.h;
}
function getMouse(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) * VW / rect.width,
    my: (e.clientY - rect.top)  * VH / rect.height,
  };
}

// ── Scene drawing ─────────────────────────────────────────────────

function drawBg() {
  r(0, TOP,      VW, SH - 60, C.wall);
  r(0, TOP,      VW, 6, '#1a1a2a');        // ceiling shadow strip
  // Subtle wall texture — sparse noise
  for (let wx = 6; wx < VW; wx += 18) {
    for (let wy = TOP + 9; wy < TOP + SH - 69; wy += 15) {
      const ox = (wy % 30 < 15) ? 9 : 0;
      r(wx + ox, wy, 1, 1, '#2d2d3c');
    }
  }
  // Wainscoting chair rail
  r(0, TOP + SH - 69, VW, 2, '#222234');
  r(0, TOP + SH - 67, VW, 2, '#2a2a3e');
  // Dark transition strip
  r(0, TOP + SH - 66, VW, 3,  C.wallDk);
  // Baseboard with detail
  r(0, TOP + SH - 63, VW, 6,  C.base);
  r(0, TOP + SH - 63, VW, 2, '#202036');
  r(0, TOP + SH - 58, VW, 2, '#121222');
  // Floor
  r(0, TOP + SH - 57, VW, 57, C.floor);
  for (let i = 0; i < 4; i++) r(0, TOP + SH - 51 + i * 12, VW, 1, C.floorDk);
  // Tape mark (actor position)
  r(165, TOP + SH - 9,  21, 2, C.tape);
  r(174, TOP + SH - 15,  3, 9, C.tape);
}

function drawLight() {
  const lx = 177;
  const ly = TOP;
  // Cord
  r(lx + 2, ly, 3, 12, '#2a2a3a');
  // Mounting plate
  r(lx - 3, ly + 12, 12, 5, C.lightMtl);
  // Shade (wider toward bottom)
  r(lx - 6, ly + 17, 18, 3, '#3a3a4a');
  r(lx - 9, ly + 20, 24, 5, C.lightShade);
  // Bulb glow
  r(lx - 5, ly + 24, 15, 3, C.lightGlow);
  r(lx - 2, ly + 24,  9, 2, '#aaaabc');
}

function drawFrame() {
  // Picture frame on wall, left side — never changes
  r(33, TOP + 12, 36, 26, C.frameA);
  r(35, TOP + 14, 33, 23, C.frameB);
  // Painting: sky + hills
  r(36, TOP + 15, 30, 20, C.glass1);
  r(36, TOP + 15, 30, 11, C.glass2);
  r(36, TOP + 24, 30,  5, C.hills1);
  r(36, TOP + 27, 21,  8, C.hills2);
  r(36, TOP + 29, 12,  6, '#2e4820');
}

function drawTable() {
  // Table shadow on floor
  r(11, TOP + SH - 56, 99, 5, '#0c0c1a');
  r(8,  TOP + SH - 54, 105, 3, '#10101e');
  // Table
  r(8,  TOP + 87, 102, 8, C.tableTop);
  r(8,  TOP + 87, 102, 2, '#9a7252');      // top-surface highlight
  r(8,  TOP + 93, 102, 5, C.tableSide);
  r(14, TOP + 98, 6, 30, C.tableLeg);
  r(98, TOP + 98, 6, 30, C.tableLeg);
  r(18, TOP + 98, 2, 30, '#2a1a08');
  r(102, TOP + 98, 2, 30, '#2a1a08');
}

function drawBook(open) {
  if (open) {
    // Open binder — pages fanned out, wider on table
    r(42, TOP + 75, 6,  14, C.bookB);      // left spine
    r(48, TOP + 75, 21, 14, C.bookA);      // left page
    r(48, TOP + 75, 21, 3, '#b8aa78');
    r(51, TOP + 81, 15, 2, C.bookLine);
    r(51, TOP + 86, 11, 1, C.bookLine);
    r(69, TOP + 74,  2, 15, C.bookB);      // center spine ridge
    r(71, TOP + 75, 21, 14, C.bookA);      // right page
    r(71, TOP + 75, 21, 3, '#b8aa78');
    r(74, TOP + 81, 15, 2, C.bookLine);
    r(74, TOP + 86, 11, 1, C.bookLine);
  } else {
    // Closed binder
    r(51, TOP + 75, 6,  14, C.bookB);
    r(57, TOP + 75, 27, 14, C.bookA);
    r(57, TOP + 75, 27, 3, '#b8aa78');
    r(60, TOP + 81, 21, 2, C.bookLine);
    r(60, TOP + 86, 15, 1, C.bookLine);
  }
}

function drawMug(left) {
  const mx = left ? 18 : 83;
  const my = TOP + 69;
  r(mx,      my,      14, 18, C.mugA);
  r(mx + 11, my + 2,  3, 16, C.mugB);
  r(mx,      my + 15, 14,  3, C.mugB);
  r(mx + 2,  my,      10,  5, C.mugCoffee);
  r(mx + 14, my + 3,  3,  2, C.mugB);
  r(mx + 15, my + 5,  2,  6, C.mugB);
  r(mx + 14, my + 11, 3,  1, C.mugB);
  r(mx + 3,  my - 6,  2,  5, '#4a4a5a');
  r(mx + 9,  my - 8,  2,  6, '#4a4a5a');
}

function drawClipboard(x, y) {
  r(x,      y,      15, 21, C.boardA);
  r(x + 14, y + 2,   3, 21, C.boardB);
  r(x + 2,  y + 20, 15,  3, C.boardB);
  r(x + 3,  y - 5,   9,  6, C.boardB);
  r(x + 5,  y - 6,   6,  3, C.boardLine);
  r(x + 2,  y + 6,  12,  2, C.boardLine);
  r(x + 2,  y + 11, 12,  1, C.boardLine);
  r(x + 2,  y + 15,  9,  1, C.boardLine);
}

function drawCharacter(clipLeft, tieColor) {
  const cx = 168;
  const cy = TOP + 36;   // grounded: feet land on floor at TOP+SH-57

  // Floor shadow (at feet level)
  r(cx - 6, TOP + SH - 57, 42, 5, '#0b0b18');

  // Left arm
  if (clipLeft) {
    r(cx - 5,  cy + 24,  6,  6, C.shirt);  // shoulder
    r(cx - 5,  cy + 27,  3,  6, C.shirt);  // upper arm connector
    r(cx - 23, cy + 30, 21,  6, C.shirt);  // forearm
    r(cx - 23, cy + 30,  6,  6, C.skin);   // wrist/hand
    drawClipboard(cx - 39, cy + 20);
  } else {
    r(cx - 5, cy + 24, 5, 27, C.shirt);    // full hanging sleeve
    r(cx - 5, cy + 45, 5,  9, C.skin);     // hanging hand
  }

  // Right arm
  if (!clipLeft) {
    r(cx + 23, cy + 24,  6,  6, C.shirt);  // shoulder
    r(cx + 26, cy + 27,  3,  6, C.shirt);  // upper arm connector
    r(cx + 26, cy + 30, 21,  6, C.shirt);  // forearm
    r(cx + 41, cy + 30,  6,  6, C.skin);   // wrist/hand
    drawClipboard(cx + 42, cy + 20);
  } else {
    r(cx + 24, cy + 24, 5, 27, C.shirt);   // full hanging sleeve
    r(cx + 24, cy + 45, 5,  9, C.skin);    // hanging hand
  }

  // Body
  r(cx,      cy + 21, 24, 33, C.shirt);
  r(cx + 20, cy + 21,  4, 33, C.shirtDk);
  // Tie
  r(cx + 9,  cy + 21,  6, 24, tieColor);
  r(cx + 8,  cy + 42,  9,  8, tieColor);
  // Collar
  r(cx + 2,  cy + 21, 21,  6, '#e0e0e0');
  r(cx + 9,  cy + 21,  6,  8, '#d4d4d4');
  // Pants
  r(cx,      cy + 54, 24, 33, C.pants);
  r(cx + 11, cy + 60,  3, 27, C.pantsDk);
  r(cx + 20, cy + 54,  4, 33, C.pantsDk);
  // Shoes
  r(cx - 2,  cy + 86, 12,  7, C.shoe);
  r(cx + 12, cy + 86, 12,  7, C.shoe);
  r(cx - 3,  cy + 90,  5,  3, C.shoe);
  r(cx + 23, cy + 90,  5,  3, C.shoe);
  // Head
  r(cx + 3,  cy,      18, 21, C.skin);
  r(cx + 20, cy + 2,   3, 17, C.skin);
  r(cx + 2,  cy + 3,   2, 15, '#c09060');
  // Hair
  r(cx + 3,  cy,      18,  6, C.hair);
  r(cx + 3,  cy + 6,   3,  5, C.hair);
  r(cx + 18, cy + 6,   3,  5, C.hair);
  // Eyes
  r(cx + 6,  cy + 9,   5,  5, '#181010');
  r(cx + 14, cy + 9,   5,  5, '#181010');
  r(cx + 6,  cy + 9,   2,  2, '#fff');
  r(cx + 14, cy + 9,   2,  2, '#fff');
  // Nose & mouth
  r(cx + 11, cy + 14,  3,  3, '#b88060');
  r(cx + 8,  cy + 18,  8,  2, '#8a5848');
}

function drawRack(hasJacket) {
  const rx = 293;
  r(rx - 15, TOP + SH - 9,  33, 5, C.rack);
  r(rx - 21, TOP + SH - 6,  45, 6, C.rackMid);
  r(rx,      TOP + 12,  5, SH - 15, C.rack);
  r(rx + 3,  TOP + 12,  2, SH - 15, C.rackMid);
  r(rx - 33, TOP + 12, 69,  5, C.rack);
  r(rx - 36, TOP + 9,   6, 11, C.rackMid);
  r(rx + 33, TOP + 9,   6, 11, C.rackMid);

  if (hasJacket) {
    r(rx - 20, TOP + 17, 45,  8, C.jacketB);
    r(rx - 17, TOP + 17, 39,  8, C.jacketA);
    r(rx - 20, TOP + 24, 20, 39, C.jacketA);
    r(rx - 20, TOP + 24,  3, 39, C.jacketB);
    r(rx -  3, TOP + 24,  3, 39, C.jacketB);
    r(rx +  5, TOP + 24, 20, 39, C.jacketA);
    r(rx + 21, TOP + 24,  3, 39, C.jacketB);
    r(rx -  2, TOP + 24,  8, 39, C.jacketB);
    r(rx,      TOP + 24,  5, 39, '#180802');
    r(rx - 11, TOP + 24,  8, 15, C.jacketB);
    r(rx +  8, TOP + 24,  8, 15, C.jacketB);
    r(rx - 17, TOP + 45,  9,  8, C.jacketB);
    r(rx + 12, TOP + 45,  9,  8, C.jacketB);
    r(rx +  2, TOP + 30,  2,  2, '#c89858');
    r(rx +  2, TOP + 36,  2,  2, '#c89858');
    r(rx +  2, TOP + 42,  2,  2, '#c89858');
  }
}

function drawPlant() {
  // Potted plant, far right — never changes
  const px = 330;
  const py = TOP + SH - 57;  // floor level
  // Pot
  r(px,      py,      24, 20, C.potA);
  r(px + 2,  py + 17, 21,  3, C.potB);
  r(px + 5,  py,      15,  5, C.potB);
  r(px + 3,  py + 3,  18,  6, C.soil);
  // Stems
  r(px + 11, py - 17,  3, 17, C.stemA);
  r(px + 8,  py - 23,  3, 11, C.stemA);
  r(px + 15, py - 20,  3, 14, C.stemA);
  // Leaves
  r(px + 5,  py - 29, 15, 11, C.leafA);
  r(px + 2,  py - 24, 11,  8, C.leafB);
  r(px + 15, py - 26, 11,  8, C.leafB);
  r(px + 8,  py - 33,  9,  6, C.leafC);
  r(px + 3,  py - 21,  6,  5, C.leafB);

const CHANGEABLE = ['mug', 'clipboard', 'jacket', 'chair', 'tie', 'book', 'waterBottle', 'hatOnRack'];
const STABLE     = ['frame', 'plant', 'light'];
// Submit button (virtual coords, sits in bottom bar)
const SUBMIT = { x: VW / 2 - 48, y: TOP + SH + 6, w: 96, h: 15 };

// ── Round generation ──────────────────────────────────────────────
const ROUND_COUNT = 3;
const CHANGES_PER_ROUND = [3, 4, 5];

const ZONE_TO_STATE = {
  mug: 'mugLeft', clipboard: 'clipLeft', jacket: 'hasJacket',
  chair: 'chairLeft', tie: 'tieRed', book: 'bookOpen',
  waterBottle: 'waterBottle', hatOnRack: 'hatOnRack',
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateRounds() {
  const rounds = [];
  for (let i = 0; i < ROUND_COUNT; i++) {
    const take1 = {};
    for (const key of Object.keys(ZONE_TO_STATE)) {
      take1[ZONE_TO_STATE[key]] = Math.random() < 0.5;
    }
    const numChanges = CHANGES_PER_ROUND[i];
    const changedZones = shuffle(CHANGEABLE).slice(0, numChanges);
    const take2 = { ...take1 };
    for (const zone of changedZones) {
      const stateKey = ZONE_TO_STATE[zone];
      take2[stateKey] = !take1[stateKey];
    }
    rounds.push({ take1, take2 });
  }
  return rounds;
}

let ROUNDS = generateRounds();

function getChangedZones(round) {
  const changed = [];
  for (const [zone, stateKey] of Object.entries(ZONE_TO_STATE)) {
    if (round.take1[stateKey] !== round.take2[stateKey]) changed.push(zone);
  }
  return changed;
}

// ── Title / intro / end screens ───────────────────────────────────
function drawTitle(frame) {
  r(0, 0, VW, VH, C.uiBg);

  const bx  = VW / 2 - 60;  // left edge = 120

  const bw  = 120;
  const cH  = 21;   // clapper stick height
  const bdH = 60;   // body height

  // Drop shadow
  r(bx + 5, by + 5, bw + 3, cH + bdH, '#000');

  // ── Diagonal stripe clapper ──
  ctx.save();
  ctx.beginPath();
  ctx.rect(bx * S, by * S, bw * S, cH * S);
  ctx.clip();
  r(bx, by, bw, cH, '#161616');
  const stripeW = 12 * S;
  const clipPx  = cH * S;
  ctx.fillStyle = '#e2e2e2';
  for (let i = -1; i <= Math.ceil((bw * S + clipPx) / (stripeW * 2)) + 1; i++) {
    const px = bx * S + i * stripeW * 2;
    ctx.beginPath();
    ctx.moveTo(px,               by * S);
    ctx.lineTo(px + stripeW,     by * S);
    ctx.lineTo(px + stripeW + clipPx, (by + cH) * S);
    ctx.lineTo(px + clipPx,      (by + cH) * S);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // ── Hinge bar ──
  r(bx - 2, by + cH - 6, bw + 3, 8, '#383838');

  r(bx + bw / 2 - 5, by + cH - 6,  9,  8, '#363636');

  r(bx - 2, by + cH + bdH,  bw + 3, 2,            '#1c1c1c');
  r(bx - 2, by,             2,       cH + bdH + 2, '#1c1c1c');
  r(bx + bw, by,            2,       cH + bdH + 2, '#1c1c1c');

// ── Result overlay ────────────────────────────────────────────────
function drawResult(roundState, selected, roundScore, correct, wrong, totalChanged, maxForRound) {
  const z = getZones(roundState.take2);
  const changedZones = getChangedZones(roundState);
  // Green = found, amber dashed = missed
  for (const key of changedZones) {
    if (selected.has(key)) outline(z[key], 'rgba(30,180,40,0.95)',  false);  // found ✓
    else                   outline(z[key], 'rgba(200,130,0,0.9)',   true);   // missed !
  }
  // Red = wrong click (stable OR non-changed changeable)
  for (const key of Object.keys(z)) {
    if (!changedZones.includes(key) && selected.has(key))
      outline(z[key], 'rgba(190,30,20,0.95)', false);  // wrong ✗
  }
  // Top bar
  const topMsg = `${correct}/${totalChanged} FOUND  ${wrong > 0 ? '· ' + wrong + ' WRONG' : ''}`;
  drawTopBar(topMsg);
  // Bottom bar
  const by = TOP + SH;
  r(0, by, VW, BOT, C.uiBg);
  const scoreCol = roundScore > 0 ? C.uiGold : C.uiDim;
  txt(`ROUND: ${roundScore}/${maxForRound} PTS`, VW / 2, by + BOT / 2, 5, scoreCol);
}

// ── Game state ────────────────────────────────────────────────────
const OBSERVE_F = 480;   // 8 s
const CUT_F     = 55;
const INTRO_F   = 110;
const RESULT_F  = 260;   // ~4 s (or click to continue)

let state     = 'TITLE';
let roundIdx  = 0;
let score     = 0;
let timer     = 0;
let frame     = 0;
let hovered   = null;   // zone key under cursor
let submitHov = false;  // cursor over submit button
let selected  = new Set();
let lastResult  = { correct: 0, wrong: 0, roundScore: 0 };
let _resultTime = 0;   // timestamp when RESULT state was entered (double-click guard)

function rnd() { return ROUNDS[Math.min(roundIdx, ROUNDS.length - 1)]; }

function processSubmit() {
  const changedZones = getChangedZones(rnd());
  let correct = 0, wrong = 0;
  for (const k of selected) {
    if (changedZones.includes(k)) correct++;
    else                           wrong++;
  }
  const maxForRound = changedZones.length * 10;
  const roundScore = Math.max(0, correct * 10 - wrong * 5);
  score += roundScore;
  lastResult = { correct, wrong, roundScore, maxForRound, totalChanged: changedZones.length };
  timer = 0;
  state = 'RESULT';
  _resultTime = Date.now();
}

function advanceFromResult() {
  roundIdx++;
  if (roundIdx >= ROUNDS.length) {
    state = 'END';
  } else {
    selected.clear();
    timer = 0;
    state = 'INTRO';
  }
}

// ── HUD elements (cached once) ────────────────────────────────────
const phaseEl = document.getElementById('hud-phase');
const scoreEl = document.getElementById('hud-score');
const roundEl = document.getElementById('hud-round');
const tcEl    = document.getElementById('hud-tc');

// ── HUD updater ───────────────────────────────────────────────────
function updateHUD() {

  const phaseMap = {
    TITLE:   'STANDBY',
    INTRO:   `SCENE ${roundIdx + 1} / ${ROUNDS.length}`,
    OBSERVE: 'TAKE 1  ·  OBSERVE',
    CUT:     'CUT!',
    SPOT:    'TAKE 2  ·  SPOT CHANGES',
    RESULT:  'REVIEWING',
    END:     'WRAPPED',
  };
  if (phaseEl) phaseEl.textContent = phaseMap[state] || state;
  if (scoreEl) scoreEl.textContent = `${score} PTS`;
  if (roundEl) {
    if (state === 'TITLE' || state === 'END') roundEl.textContent = `${ROUNDS.length} ROUNDS`;
    else roundEl.textContent = `ROUND ${roundIdx + 1} / ${ROUNDS.length}`;
  }
  const fps = 60;
  const ff  = frame % fps;
  const ss  = Math.floor(frame / fps) % 60;
  const mm  = Math.floor(frame / (fps * 60)) % 60;
  const hh  = Math.floor(frame / (fps * 3600)) % 24;
  const pad = n => String(n).padStart(2, '0');
  if (tcEl) tcEl.textContent = `${pad(hh)}:${pad(mm)}:${pad(ss)}:${pad(ff)}`;
}

// ── Main loop ─────────────────────────────────────────────────────
let _rafId;
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame++;
  updateHUD();

  if (state === 'TITLE') {
    drawTitle(frame);

  } else if (state === 'INTRO') {
    drawIntro(roundIdx, frame);
    if (++timer >= INTRO_F) { timer = 0; state = 'OBSERVE'; }

  } else if (state === 'OBSERVE') {
    drawScene(rnd().take1);
    const secs = Math.ceil((OBSERVE_F - timer) / 60);
    drawTopBar('TAKE 1', `${secs}s`);
    drawObserveBar(timer, OBSERVE_F);
    drawBottomBar(`${score} PTS`, null, `SCENE ${roundIdx + 1}/${ROUNDS.length}`);
    if (++timer >= OBSERVE_F) { timer = 0; state = 'CUT'; }

  } else if (state === 'CUT') {
    drawCut(timer, CUT_F);
    if (++timer >= CUT_F) { timer = 0; state = 'SPOT'; selected.clear(); hovered = null; }

  } else if (state === 'SPOT') {
    drawScene(rnd().take2);
    drawTopBar('TAKE 2', `${selected.size} SELECTED`);
    drawBottomBar(`${score} PTS`, null, null);

    // Zone highlights (selected or hovered)
    const z = getZones(rnd().take2);
    for (const [k, zn] of Object.entries(z)) {
      if (selected.has(k)) outline(zn, 'rgba(240,210,30,0.85)', false);
      else if (hovered === k) outline(zn, 'rgba(180,160,30,0.5)', true);
    }
    drawSubmitBtn(submitHov);

  } else if (state === 'RESULT') {
    drawScene(rnd().take2);
    drawResult(rnd(), selected, lastResult.roundScore, lastResult.correct, lastResult.wrong, lastResult.totalChanged, lastResult.maxForRound);
    if (++timer >= RESULT_F) advanceFromResult();

  } else if (state === 'END') {
    const totalMax = ROUNDS.reduce((sum, round) => sum + getChangedZones(round).length * 10, 0);
    drawEnd(score >= Math.ceil(totalMax * 0.6), score, totalMax, frame);
  }
  _rafId = requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────
function getTouch(e) {
  const touch = e.changedTouches[0];
  const rect  = canvas.getBoundingClientRect();
  return {
    mx: (touch.clientX - rect.left) * VW / rect.width,
    my: (touch.clientY - rect.top)  * VH / rect.height,
  };
}

function handleInteract(mx, my) {
  if (state === 'TITLE') {
    ROUNDS = generateRounds();
    roundIdx = 0; score = 0; timer = 0; frame = 0;
    selected.clear();
    state = 'INTRO';
    return;
  }
  if (state === 'END') {
    roundIdx = 0; score = 0; timer = 0; frame = 0;
    selected.clear();
    state = 'TITLE';
    return;
  }
  if (state === 'RESULT') {
    if (Date.now() - _resultTime > 300) advanceFromResult();
    return;
  }
  if (state !== 'SPOT') return;

  if (inZ(mx, my, SUBMIT)) {
    processSubmit();
    return;
  }

  const z = getZones(rnd().take2);
  for (const [k, zn] of Object.entries(z)) {
    if (inZ(mx, my, zn)) {
      if (selected.has(k)) selected.delete(k);
      else selected.add(k);
      break;
    }
  }
}

canvas.addEventListener('mousemove', e => {
  const { mx, my } = getMouse(e);
  hovered   = null;
  submitHov = false;

  if (state === 'SPOT') {
    if (inZ(mx, my, SUBMIT)) { submitHov = true; }
    else {
      const z = getZones(rnd().take2);
      for (const [k, zn] of Object.entries(z)) {
        if (inZ(mx, my, zn)) { hovered = k; break; }
      }
    }
    canvas.style.cursor = (hovered || submitHov) ? 'pointer' : 'crosshair';
  } else {
    canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('click', e => {
  const { mx, my } = getMouse(e);
  handleInteract(mx, my);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const { mx, my } = getTouch(e);
  hovered = null; submitHov = false;
  handleInteract(mx, my);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'SPOT') return;
  const { mx, my } = getTouch(e);
  hovered = null; submitHov = false;
  if (inZ(mx, my, SUBMIT)) { submitHov = true; return; }
  const z = getZones(rnd().take2);
  for (const [k, zn] of Object.entries(z)) {
    if (inZ(mx, my, zn)) { hovered = k; break; }
  }
}, { passive: false });

// ── Boot ──────────────────────────────────────────────────────────
if (new URLSearchParams(location.search).has('embedded')) {
  const bl = document.querySelector('.back-link');
  if (bl) bl.style.display = 'none';
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) cancelAnimationFrame(_rafId);
  else _rafId = requestAnimationFrame(loop);
});
document.fonts.ready.then(() => { _rafId = requestAnimationFrame(loop); });
</script>
</body>
</html>
